<div id="dynamic-surprise-yuyu" style="
position: fixed;
    top: 5%; /* Kasih jarak dikit dari paling atas */
    left: 50%;
    transform: translateX(-50%);
    width: 95%; /* Jangan 100% biar gak mepet pinggir layar HP */
    max-width: 900px;
    z-index: 9999;
    pointer-events: none;
">
    <svg viewBox="0 0 500 200" style="overflow: visible;">
        <path id="lovePathDynamic" d="M 50,150 Q 250,10 450,150" fill="transparent" />
        <text style="
font-family: 'Georgia', serif;
            font-style: italic;
            fill: #ffffff;
            filter: drop-shadow(0 0 8px #6bf0ff);
            text-anchor: middle;
        ">
            <textPath id="text-target" href="#lovePathDynamic" startOffset="50%">
                </textPath>
        </text>
    </svg>

    <script>
        const messages = [
            "dudul buatkan bunga lucu untuk yuyu",
            "semoga yuyuna suka ya",
            "terimakasih sudah selalu ada buat dudul",
            "dan terimakasih tetap mau bertahan",
            "senang rasanya bisa mengenal yuyu",
            "dudul disini tetap bersyukur",
            "karena yuyu ada dikehidupan dudul",
            "semoga yuyu senang",
            "dengan web buatan dudul yang sederhana",
        ];

        let i = 0;
        const textElement = document.getElementById('text-target');

        function updateText() {
            textElement.style.transition = "opacity 1s";
            textElement.style.opacity = 0;

            setTimeout(() => {
                textElement.textContent = messages[i];
                textElement.style.opacity = 1;
                
                i = (i + 1) % messages.length;
            }, 1000);
        }
        updateText();
        setInterval(updateText, 5000);
    </script>

    <style>
        #text-target {
            transition: opacity 1s ease-in-out;
        }
    </style>
</div>
